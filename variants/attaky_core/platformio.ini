[Attaky_Core]
extends = esp32_base
board = attaky_core
build_flags =
  ${esp32_base.build_flags}
  -I variants/attaky_core
  -D ATTAKY_CORE
  -D BOARD_HAS_PSRAM=1
  ; USB-C goes through CH340X -> UART0, so Serial must be UART0 (CDC_ON_BOOT=0),
  ; not the ESP32-S3 native USB CDC (whose IO19/20 are routed to the BTB, not USB).
  -D ARDUINO_USB_CDC_ON_BOOT=0
  ; --- LoRa: Expand_LoRa-GPS_1.0 -> Ra-01SH (Semtech SX1262) ---
  ; Ra-01SH uses a 32 MHz CRYSTAL, NOT a TCXO (datasheet schematic XTA/XTB + 32M).
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D P_LORA_NSS=8
  -D P_LORA_DIO_1=21
  -D P_LORA_RESET=9
  -D P_LORA_BUSY=16
  -D P_LORA_SCLK=5
  -D P_LORA_MISO=7
  -D P_LORA_MOSI=6
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true
  ; 0 = crystal mode. MUST be explicit: radio_init() defaults tcxo to 1.6f when undefined,
  ; which would init DIO3 as a TCXO supply and fail on this crystal-based module.
  -D SX126X_DIO3_TCXO_VOLTAGE=0
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  ; Attaky LoRa-GPS is 915-band hardware, so default to the MeshCore US/Canada
  ; preset (910.525 MHz, SF7) instead of the upstream EU default (869.618, SF8).
  ; Region stays runtime-tunable via the companion `set freq` command.
  -D LORA_FREQ=910.525
  -D LORA_SF=7
  ; --- shared I2C bus (host AW9523 expanders @0x58/0x59, IMU, ALS, touch) ---
  -D PIN_BOARD_SDA=2
  -D PIN_BOARD_SCL=1
  ; --- ST7789 TFT (240x320, dedicated HSPI; panel mounted 180deg in case) ---
  ; Rotation 1 (landscape) is verified upright on hardware with the
  ; Adafruit_ST7789 driver. (The panel's documented "setRotation(3)" assumes the
  ; TFT_eSPI driver, whose MADCTL convention differs from Adafruit's.)
  -D PIN_TFT_CS=45
  -D PIN_TFT_DC=12
  -D PIN_TFT_RST=10
  -D PIN_TFT_SCL=11
  -D PIN_TFT_SDA=13
  -D PIN_TFT_LEDA_CTL=14
  -D DISPLAY_ROTATION=1
  -D DISPLAY_SCALE_X=2.5f
  -D DISPLAY_SCALE_Y=3.75f
build_src_filter = ${esp32_base.build_src_filter}
  +<helpers/sensors/*.cpp>
  +<../variants/attaky_core>
  -<../variants/attaky_core/selftest>

; --- Headless radio bring-up (no display, no input) ---
; Builds the repeater app to exercise radio + mesh end-to-end on real hardware.
[env:attaky_core_radio_headless]
extends = Attaky_Core
; CH340X USB-UART on Attaky Core is unreliable at 921600; 460800 is stable.
; upload_speed must live in the compiled env — it is not inherited via `extends`.
upload_speed = 460800
build_flags =
  ${Attaky_Core.build_flags}
  -D ADVERT_NAME='"Attaky Core Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${Attaky_Core.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${Attaky_Core.lib_deps}
  ${esp32_ota.lib_deps}

; --- AW9523 @0x59 button-input self-test (no app, no display) ---
; Prints PRESS/RELEASE per face button over serial for bring-up verification.
; Minimal source set: only the button driver + the self-test main. Does NOT
; pull in the MeshCore mesh stack or target.cpp (no radio object needed).
[env:attaky_core_buttontest]
extends = Attaky_Core
upload_speed = 460800
build_src_filter =
  -<*>
  +<../variants/attaky_core/AW9523Buttons.cpp>
  +<../variants/attaky_core/selftest/board_selftest.cpp>
; Minimal deps: the button self-test only needs Wire (drops RadioLib/RTClib
; etc. inherited from the base, which would otherwise build needlessly).
lib_deps =
  Wire

; --- ST7789 display bring-up self-test (no app, no mesh) ---
; Draws a labelled test pattern so the operator can confirm the panel renders
; in the correct orientation. Minimal source set: only the display driver +
; the self-test main.
[env:attaky_core_displaytest]
extends = Attaky_Core
upload_speed = 460800
build_src_filter =
  -<*>
  +<helpers/ui/ST7789LCDDisplay.cpp>
  +<../variants/attaky_core/selftest/display_selftest.cpp>
lib_deps =
  SPI
  Wire
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

; --- GPS UART self-test (raw NMEA echo, no app/mesh) ---
; Echoes raw NMEA from the ATGM336H so the operator can confirm the GPS UART
; wiring (PIN_GPS_TX=17 -> ESP RX) and that the module streams sentences.
[env:attaky_core_gpstest]
extends = Attaky_Core
upload_speed = 460800
build_flags =
  ${Attaky_Core.build_flags}
  -D PIN_GPS_TX=17
  -D PIN_GPS_RX=18
  -D GPS_BAUD_RATE=9600
build_src_filter =
  -<*>
  +<../variants/attaky_core/selftest/gps_selftest.cpp>
; Echo test only uses the Arduino framework Serial — no MeshCore libs.
lib_deps =

; --- USB-serial companion firmware (ST7789 UI + D-pad nav) ---
; Runs the companion_radio app: on-device status UI (Splash/Home/MsgPreview)
; navigated by the AW9523 face buttons (UI_HAS_JOYSTICK), messaging via the
; MeshCore web/phone app over the CH340X USB serial. Also serves as the
; input-to-UI test vehicle.
[env:attaky_core_companion_usb]
extends = Attaky_Core
upload_speed = 460800
build_flags =
  ${Attaky_Core.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=ST7789LCDDisplay
  -D UI_HAS_JOYSTICK=1
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  ; Expand_LoRa-GPS ATGM336H GPS on Serial1, 9600 NMEA. MeshCore passes
  ; PIN_GPS_TX as the ESP RX arg, so PIN_GPS_TX=17 (ESP RX <- GPS TXD) and
  ; PIN_GPS_RX=18 (ESP TX -> GPS RXD). GPS TXD lands on IO17 (real-HW
  ; verified: NMEA confirmed on IO17, silent on IO18). GPS-only: other
  ; ENV_INCLUDE_* stay off.
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_TX=17
  -D PIN_GPS_RX=18
  -D GPS_BAUD_RATE=9600
build_src_filter = ${Attaky_Core.build_src_filter}
  +<helpers/ui/ST7789LCDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Attaky_Core.lib_deps}
  densaugeo/base64 @ ~1.4.0
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  stevemarple/MicroNMEA @ ^2.0.6

; --- BLE companion firmware (ST7789 UI + D-pad nav, phone-app pairing) ---
; Same as attaky_core_companion_usb but the host<->phone transport is BLE
; instead of USB serial: defining BLE_PIN_CODE makes companion_radio select
; helpers/esp32/SerialBLEInterface. BLE_PIN_CODE=123456 is a sentinel — with
; the display present the device shows a fresh random 6-digit pairing PIN on
; screen each session (a non-123456 value would be a fixed static PIN). USB
; serial still carries the boot log.
[env:attaky_core_companion_ble]
extends = Attaky_Core
upload_speed = 460800
build_flags =
  ${Attaky_Core.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=ST7789LCDDisplay
  -D UI_HAS_JOYSTICK=1
  -D MAX_CONTACTS=350
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D OFFLINE_QUEUE_SIZE=256
  ; Expand_LoRa-GPS ATGM336H GPS on Serial1, 9600 NMEA. MeshCore passes
  ; PIN_GPS_TX as the ESP RX arg, so PIN_GPS_TX=17 (ESP RX <- GPS TXD) and
  ; PIN_GPS_RX=18 (ESP TX -> GPS RXD). GPS TXD lands on IO17 (real-HW
  ; verified: NMEA confirmed on IO17, silent on IO18).
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_TX=17
  -D PIN_GPS_RX=18
  -D GPS_BAUD_RATE=9600
build_src_filter = ${Attaky_Core.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/ST7789LCDDisplay.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Attaky_Core.lib_deps}
  densaugeo/base64 @ ~1.4.0
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0
  stevemarple/MicroNMEA @ ^2.0.6
